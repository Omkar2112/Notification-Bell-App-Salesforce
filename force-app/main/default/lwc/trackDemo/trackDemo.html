<template>
    <lightning-card title="Premitive type " >
        <lightning-input label="First Name" value={firstName} onkeyup={handlefirstNameChange}></lightning-input>
        <lightning-input label="Last Name" value={lastName} onkeyup={handlelastNameChange}></lightning-input>
        <lightning-input label="Email" value={Email} onkeyup={handleEmailChange}></lightning-input>
    </lightning-card>

    <lightning-card title="Premitive type Data">
        <p>First Name : {firstName}</p>
        <p>Last Name: {lastName}</p>
        <p>Email : {Email}</p>
    </lightning-card>

    <lightning-card title="Student Data">
        <p>StudentData First Name : {studentData.fistName}</p>
        <p>StudentData Lirst Name : {studentData.lastName}</p>
        <p>StudentData Email : {studentData.Email}</p>
    </lightning-card>

    <lightning-card title="Reactive Data">
        <p>Reactive First Name : {reactiveData.firstName}</p>
        <p>Reactive Last Name : {reactiveData.lastName}</p>
        <p>Reactive Email: {reactiveData.Email}</p>
    </lightning-card>



</template>
