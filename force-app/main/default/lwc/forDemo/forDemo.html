<template>
    <!-- its is a For Loop Demo -->
   <div class="slds-m-around_small">
     <lightning-card title ='Demo For Loop' icon-name='standard:opportunity'>
        <template for:each={accounts} for:item='item' for:index='index'>
        <p key = {item.id} class="slds-m-around_small">
            {index} - {item.id} &nbsp; {item.name} &nbsp; {item.phone}</p>
        </template>
     </lightning-card>
   </div>

   <!-- this is iterator demo -->
   <div class="slds-m-around_small">
    <lightning-card title ='Demo Iterator Loop' icon-name='standard:opportunity'>
    <template iterator:it={accounts}>
        <p key={it.value.id} class="slds-m-around_small">
            {it.index} - {it.value.id} &nbsp; {it.value.name} &nbsp; {it.value.phone}</p>
    </template>
    </lightning-card>
 </div>

    <!-- Iterator Demo 2 -->
 <div class="slds-m-around_small">
    <lightning-card title ='Iterator Demo 2' icon-name="standard:contact">
        <template iterator:it={accounts}>
            <p key={it.value.id} class = "slds-m-around_small">
                {it.value.id} &nbsp; {it.value.name} &nbsp; {it.value.phone}
            </p>
            
        </template>
    </lightning-card>
</div>
</template>
